companies:
  - name: AEP Transmission
    query: '"AEP Transmission"'
    slug: aep-transmission

  - name: Alabama Power Company
    query: '"Alabama Power" OR "Alabama Power Company"'
    slug: alabama-power-company

  - name: Chrysalis
    query: '"Chrysalis" energy'
    slug: chrysalis

  - name: Crane Restart
    query: '"Crane Restart" OR "Crane Clean Energy Center" OR "Three Mile Island restart"'
    slug: crane-restart

  - name: Georgia Power Company
    query: '"Georgia Power" OR "Georgia Power Company"'
    slug: georgia-power-company

  - name: Energy Dominance Financing
    query: '"Energy Dominance Financing" OR "energy dominance financing"'
    slug: energy-dominance-financing

settings:
  max_results_per_company: 25
  lookback_days: 30
  sleep_seconds_between_companies: 5
